name: Auto Blog Post

on:
  repository_dispatch:
    types: [blog-post]

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run autoposter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'claude-haiku-4-5' }}
          TISTORY_COOKIES: ${{ secrets.TISTORY_COOKIES }}
          TISTORY_BLOG_NAME: ${{ secrets.TISTORY_BLOG_NAME }}
          SOURCE_REPO_PAT: ${{ secrets.SOURCE_REPO_PAT }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: node dist/index.js

      - name: Commit state changes
        run: |
          if [ -d state ] && git diff --quiet -- state/ 2>/dev/null; then
            echo "상태 변경 없음"
          elif [ -d state ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/
            git commit -m "chore: update publish state" || echo "커밋할 변경 없음"
            git push
          fi
